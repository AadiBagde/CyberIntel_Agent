services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cyberintel
      POSTGRES_PASSWORD: cyberintel
      POSTGRES_DB: cyberintel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberintel -d cyberintel"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cyberintel:cyberintel@postgres:5432/cyberintel
      QDRANT_URL: http://qdrant:6333
      APP_ENV: development
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
  qdrant_data:
